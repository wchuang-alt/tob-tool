<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>toB 轉載作品下架提醒工具</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* 這裡找回了你最原始、最漂亮的 CSS 樣式 */
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#f5f4f0;font-family:'微軟正黑體','Georgia',serif;color:#1a1a1a;min-height:100vh;}
    header{background:#1a1a2e;color:#fff;padding:20px 40px;border-bottom:4px solid #e8c84a;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
    .header-left .tag{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#e8c84a;font-family:monospace;}
    .header-left h1{font-size:22px;font-weight:700;display:inline;margin-left:10px;}
    #google-btn{display:flex;align-items:center;gap:8px;background:#fff;color:#333;border:none;border-radius:4px;padding:8px 16px;font-size:13px;cursor:pointer;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
    #user-info{display:none;align-items:center;gap:8px;font-size:13px;}
    #user-info img{width:28px;height:28px;border-radius:50%;border:2px solid #e8c84a;}
    #main-app{display:none;}
    .main-tabs{display:flex;background:#1a1a2e;padding:0 40px;}
    .main-tab{padding:14px 28px;font-size:14px;cursor:pointer;background:none;border:none;color:#aaa;border-bottom:3px solid transparent;transition:all 0.15s;font-weight:600;}
    .main-tab.active{color:#e8c84a;border-bottom-color:#e8c84a;}
    .tab-content{display:none;max-width:1100px;margin:0 auto;padding:28px 20px;}
    .tab-content.active{display:block;}
    .settings-panel{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:20px 24px;margin-bottom:24px;}
    .settings-panel h3{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #e8c84a;}
    .setting-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
    .setting-row label{font-size:13px;color:#555;min-width:100px;}
    .setting-row input{flex:1;border:1px solid #ddd;border-radius:4px;padding:8px 12px;font-size:13px;}
    .btn-save{background:#1a1a2e;color:#e8c84a;border:none;border-radius:4px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;}
    .btn-load{background:#e8c84a;color:#1a1a2e;border:none;border-radius:4px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;}
    .info-bar{background:#fff;border:1px solid #e0e0e0;border-radius:4px;padding:8px 14px;font-size:12px;color:#555;margin-bottom:10px;}
    table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border:1px solid #e0e0e0;}
    thead tr{background:#f0efe9;}
    th{padding:9px 12px;text-align:left;color:#666;font-weight:700;border-bottom:1px solid #e0e0e0;}
    td{padding:9px 12px;border-bottom:1px solid #f0f0f0;}
    .status-overdue{color:#ff4444;font-weight:700;}
  </style>
</head>
<body>

<header>
  <div class="header-left"><span class="tag">MOJOIN</span><h1>toB 轉載作品下架提醒工具</h1></div>
  <button id="google-btn">使用 Google 帳號登入</button>
  <div id="user-info">
    <img id="user-avatar" src="" alt=""/>
    <span id="user-name"></span>
    <button onclick="location.reload()" style="background:none;border:1px solid #555;border-radius:4px;padding:3px 10px;font-size:11px;color:#aaa;cursor:pointer;margin-left:10px;">登出</button>
  </div>
</header>

<div id="main-app">
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchTab(event, 'manga')">📚 漫畫分頁</button>
    <button class="main-tab" onclick="switchTab(event, 'novel')">📖 小說分頁</button>
  </div>

  <div id="tab-manga" class="tab-content active">
    <div class="settings-panel">
      <h3>📧 漫畫 Sheet 設定</h3>
      <div class="setting-row">
        <label>Sheet 網址</label>
        <input type="text" id="manga-url" placeholder="貼上 Google Sheet 網址後點儲存">
        <button class="btn-save" onclick="saveUrl('manga')">儲存</button>
      </div>
    </div>
    <div class="info-bar" id="manga-info">請先載入資料</div>
    <button class="btn-load" onclick="loadData('manga')">🔄 載入漫畫資料</button>
    <div id="manga-list" style="margin-top:20px;"></div>
  </div>

  <div id="tab-novel" class="tab-content">
    <div class="settings-panel">
      <h3>📧 小說 Sheet 設定</h3>
      <div class="setting-row">
        <label>Sheet 網址</label>
        <input type="text" id="novel-url" placeholder="貼上 Google Sheet 網址後點儲存">
        <button class="btn-save" onclick="saveUrl('novel')">儲存</button>
      </div>
    </div>
    <div class="info-bar" id="novel-info">請先載入資料</div>
    <button class="btn-load" onclick="loadData('novel')">🔄 載入小說資料</button>
    <div id="novel-list" style="margin-top:20px;"></div>
  </div>
</div>

<script>
const CLIENT_ID = "929637642575-ej2th0o6r3r6sf9t6uedmrrnign77i2i.apps.googleusercontent.com";
let accessToken = null;

// 1. 介面控制
function switchTab(evt, tabName) {
  document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
  document.querySelectorAll(".main-tab").forEach(t => t.classList.remove("active"));
  document.getElementById("tab-" + tabName).classList.add("active");
  evt.currentTarget.classList.add("active");
}

function saveUrl(type) {
  const url = document.getElementById(type + "-url").value;
  localStorage.setItem("toB_url_" + type, url);
  alert("網址已儲存！");
}

// 2. 登入邏輯
document.getElementById('google-btn').onclick = () => {
  google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: "https://www.googleapis.com/auth/spreadsheets.readonly https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile",
    callback: (resp) => {
      accessToken = resp.access_token;
      fetch("https://www.googleapis.com/oauth2/v3/userinfo", { headers: { Authorization: `Bearer ${accessToken}` } })
        .then(r => r.json())
        .then(user => {
          document.getElementById('google-btn').style.display = 'none';
          document.getElementById('user-info').style.display = 'flex';
          document.getElementById('user-name').innerText = user.name;
          document.getElementById('user-avatar').src = user.picture;
          document.getElementById('main-app').style.display = 'block';
          // 載入存過的網址
          document.getElementById('manga-url').value = localStorage.getItem("toB_url_manga") || "";
          document.getElementById('novel-url').value = localStorage.getItem("toB_url_novel") || "";
        });
    }
  }).requestAccessToken();
};

// 3. 資料讀取邏輯
async function loadData(type) {
  const url = localStorage.getItem("toB_url_" + type);
  if (!url) return alert("請先輸入網址並點擊儲存！");
  
  const sheetId = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/)?.[1] || url;
  const infoEl = document.getElementById(type + "-info");
  const listEl = document.getElementById(type + "-list");
  
  infoEl.innerText = "⏳ 載入中...";
  listEl.innerHTML = "";

  try {
    // 先抓這份試算表有哪些分頁名稱
    const metaRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}`, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const meta = await metaRes.json();
    const sheetNames = meta.sheets.map(s => s.properties.title);

    let combinedRows = [];
    for (const name of sheetNames) {
      const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(name)}!A1:Z200`, {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      const data = await res.json();
      if (data.values && data.values.length > 0) {
        if (combinedRows.length === 0) {
          // 加上「分頁」標題
          const header = ["來源分頁", ...data.values[0]];
          combinedRows.push(header);
        }
        data.values.slice(1).forEach(row => {
          combinedRows.push([name, ...row]);
        });
      }
    }
    renderTable(type, combinedRows);
    infoEl.innerText = "✅ 載入完成，共 " + (combinedRows.length - 1) + " 筆資料";
  } catch (err) {
    infoEl.innerText = "❌ 載入失敗，請確認網址正確且已勾選授權框";
    console.error(err);
  }
}

function renderTable(type, rows) {
  const container = document.getElementById(type + "-list");
  if (rows.length < 2) return container.innerHTML = "無資料";
  
  let html = "<table><thead><tr>";
  // 顯示前 7 欄（分頁 + 原本的 6 欄）
  rows[0].slice(0, 7).forEach(h => html += `<th>${h}</th>`);
  html += "</tr></thead><tbody>";
  
  rows.slice(1).forEach(row => {
    html += "<tr>";
    row.slice(0, 7).forEach((cell, idx) => {
      let cls = "";
      // 簡單判斷下架日期（假設在第 7 欄，索引 6）
      if (idx === 6 && cell && cell.includes('20')) {
        if (new Date(cell) < new Date()) cls = 'class="status-overdue"';
      }
      html += `<td ${cls}>${cell || '-'}</td>`;
    });
    html += "</tr>";
  });
  html += "</tbody></table>";
  container.innerHTML = html;
}
</script>
</body>
</html>
