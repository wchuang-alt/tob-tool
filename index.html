<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>toB 轉載作品下架提醒工具</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#f5f4f0;font-family:'微軟正黑體','Georgia',serif;color:#1a1a1a;min-height:100vh;}
    header{background:#1a1a2e;color:#fff;padding:20px 40px;border-bottom:4px solid #e8c84a;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
    .header-left .tag{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#e8c84a;font-family:monospace;}
    .header-left h1{font-size:22px;font-weight:700;display:inline;margin-left:10px;}
    #google-btn{display:flex;align-items:center;gap:8px;background:#fff;color:#333;border:none;border-radius:4px;padding:8px 16px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
    #google-btn svg{width:18px;height:18px;}
    #user-info{display:none;align-items:center;gap:8px;font-size:13px;color:#ccc;}
    #user-info img{width:28px;height:28px;border-radius:50%;border:2px solid #e8c84a;}
    #btn-logout{background:none;border:1px solid #555;border-radius:4px;padding:3px 10px;font-size:11px;color:#aaa;cursor:pointer;font-family:inherit;}
    #login-screen{max-width:480px;margin:80px auto;text-align:center;background:#fff;border-radius:8px;padding:48px 40px;box-shadow:0 4px 20px rgba(0,0,0,0.08);}
    .icon{font-size:52px;margin-bottom:16px;}
    #access-denied{display:none;max-width:480px;margin:80px auto;text-align:center;background:#fff0f0;border:2px solid #ff4444;border-radius:8px;padding:48px 40px;}
    #main-app{display:none;}
    .main-tabs{display:flex;background:#1a1a2e;padding:0 40px;}
    .main-tab{padding:14px 28px;font-size:14px;font-family:inherit;cursor:pointer;background:none;border:none;color:#aaa;border-bottom:3px solid transparent;transition:all 0.15s;font-weight:600;}
    .main-tab.active{color:#e8c84a;border-bottom-color:#e8c84a;}
    .tab-content{display:none;max-width:1100px;margin:0 auto;padding:28px 20px;}
    .tab-content.active{display:block;}
    .settings-panel{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:20px 24px;margin-bottom:24px;}
    .setting-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;}
    .setting-row label{font-size:13px;color:#555;min-width:100px;padding-top:9px;}
    .setting-row input, .setting-row textarea{flex:1;min-width:200px;border:1px solid #ddd;border-radius:4px;padding:8px 12px;font-size:13px;}
    .btn-save, .btn-load{border:none;border-radius:4px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;}
    .btn-save{background:#1a1a2e;color:#e8c84a;}
    .btn-load{background:#e8c84a;color:#1a1a2e;}
    .email-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
    .email-tag{background:#f0efe9;border:1px solid #ddd;border-radius:20px;padding:4px 12px;font-size:12px;}
    .data-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
    .info-bar{background:#fff;border:1px solid #e0e0e0;border-radius:4px;padding:8px 14px;font-size:12px;}
    .month-group-header{background:#1a1a2e;color:#e8c84a;padding:12px 20px;margin-top:24px;border-radius:6px 6px 0 0;display:flex;justify-content:space-between;cursor:pointer;}
    .month-table-wrap{border:1px solid #e0e0e0;border-top:none;border-radius:0 0 6px 6px;overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;}
    th{background:#f0efe9;padding:9px 12px;text-align:left;border-bottom:1px solid #e0e0e0;}
    td{padding:9px 12px;border-bottom:1px solid #f0f0f0;}
    .hidden{display:none;}
  </style>
</head>
<body>

<header>
  <div class="header-left"><span class="tag">MOJOIN</span><h1>toB 轉載作品下架提醒工具</h1></div>
  <div style="display:flex;align-items:center;gap:12px;">
    <button id="google-btn">使用 Google 登入</button>
    <div id="user-info">
      <img id="user-avatar" src=""/><span id="user-name"></span><button id="btn-logout">登出</button>
    </div>
  </div>
</header>

<div id="login-screen">
  <div class="icon">📋</div>
  <h2>toB 轉載作品下架提醒工具</h2>
  <p>請使用授權的 Google 帳號登入</p>
  <button id="google-btn-2" style="padding:10px 20px; cursor:pointer;">Google 登入</button>
</div>

<div id="access-denied">
  <h2>⛔ 無使用權限</h2>
  <p>你的帳號不在授權名單內。</p>
  <button id="btn-logout-denied">登出</button>
</div>

<div id="main-app">
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchMainTab('manga')">📚 漫畫</button>
    <button class="main-tab" onclick="switchMainTab('novel')">📖 小說</button>
    <button class="main-tab" onclick="switchMainTab('admin')">⚙️ 管理</button>
  </div>

  <div id="tab-manga" class="tab-content active">
    <div class="data-header">
      <div class="info-bar" id="manga-info">尚未載入資料</div>
      <button class="btn-load" onclick="loadAllData()">🔄 載入兩份試算表資料</button>
    </div>
    <div id="manga-list"></div>
  </div>

  <div id="tab-novel" class="tab-content">
    <div class="empty">資料將與漫畫分頁同步載入</div>
    <div id="novel-list"></div>
  </div>

  <div id="tab-admin" class="tab-content">
    <div class="settings-panel">
      <h3>🔐 白名單管理</h3>
      <input type="email" id="wl-input" placeholder="輸入 Email"/><button onclick="addWhitelist()">新增</button>
      <div id="wl-list"></div>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = "929637642575-ej2th0o6r3r6sf9t6uedmrrnign77i2i.apps.googleusercontent.com";
const ID1 = '1Mu6EYvX-6pwEkzPRKRT0KUH6X3r9NwtS1U3pZEHUVQ8';
const ID2 = '1OIPrEYMPXqBTRxGLRw0q338sWXjmJnHVLsqZQk5ZIMk';
const FIELDS = ["狀態","作品","作者","下架設定"];

let accessToken = null;
let settings = { whitelist: [] };
let sheetData = { manga: [] };

function switchMainTab(tab) {
  document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
  document.getElementById("tab-" + tab).classList.add("active");
  document.querySelectorAll(".main-tab").forEach(b => b.classList.toggle("active", b.innerText.includes(tab === 'manga' ? '漫畫' : tab === 'novel' ? '小說' : '管理')));
}

function initGoogle() {
  google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: "https://www.googleapis.com/auth/spreadsheets.readonly https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile",
    callback: handleToken,
  }).requestAccessToken();
}

async function handleToken(resp) {
  accessToken = resp.access_token;
  const userRes = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", { headers: { Authorization: `Bearer ${accessToken}` } });
  const user = await userRes.json();
  
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("main-app").style.display = "block";
  document.getElementById("user-info").style.display = "flex";
  document.getElementById("user-avatar").src = user.picture;
  document.getElementById("user-name").textContent = user.name;
}

async function loadAllData() {
  if (!accessToken) return alert("請先登入");
  document.getElementById("manga-info").innerText = "載入中...";
  
  try {
    const fetchSheet = async (id) => {
      const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/Sheet1!A1:Z100`, {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      return await res.json();
    };

    const [d1, d2] = await Promise.all([fetchSheet(ID1), fetchSheet(ID2)]);
    const combined = [...(d1.values || []), ...(d2.values || []).slice(1)];
    renderTable(combined);
    document.getElementById("manga-info").innerText = `載入成功，共 ${combined.length} 筆`;
  } catch (e) {
    alert("載入失敗，請確認是否勾選權限");
  }
}

function renderTable(rows) {
  const container = document.getElementById("manga-list");
  if (!rows || rows.length < 2) return container.innerHTML = "無資料";
  
  let html = "<table><thead><tr>";
  rows[0].slice(0, 5).forEach(h => html += `<th>${h}</th>`);
  html += "</tr></thead><tbody>";
  
  rows.slice(1).forEach(row => {
    html += "<tr>";
    row.slice(0, 5).forEach(cell => html += `<td>${cell || '-'}</td>`);
    html += "</tr>";
  });
  
  html += "</tbody></table>";
  container.innerHTML = html;
}

document.getElementById("google-btn").onclick = initGoogle;
document.getElementById("google-btn-2").onclick = initGoogle;
document.getElementById("btn-logout").onclick = () => location.reload();
</script>
</body>
</html>
